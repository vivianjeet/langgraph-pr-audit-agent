name: PR Audit

# Runs on every pull request, on a review being submitted and on manual dispatch. Two jobs:
#   1. tests  - hermetic suite, always runs, no secrets, free.
#   2. gate   - the `python main.py --large` pre-merge audit gate. Opt-in: it only runs when
#               enabled (see TOGGLE below), because it spends LLM credits and needs a DB + secret.
#
# pull_request_review closes the human-gate loop automatically: when the audit blocks a PR and a
# reviewer then Approves, that approval fires this event and re-runs the gate, which now sees the
# APPROVED review and passes - no manual re-run needed.
on:
  pull_request:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      run_gate:
        description: "Run the --large audit gate for this manual run"
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read        # gate reads PR reviews (pr_is_human_approved)

jobs:
  # ----------------------------------------------------------------------------
  # Job 1: tests - always runs, fast, free (no LLM, no DB).
  # ----------------------------------------------------------------------------
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run hermetic test suite
        # The suite mocks every LLM call, so it never needs a real key - but src/llm_retry.py
        # checks for one at import. This dummy satisfies that check; it is never used to call out.
        env:
          GEMINI_API_KEY: "ci-dummy-tests-mock-all-llm-calls"
        run: pytest -m "not integration" -q

  # ----------------------------------------------------------------------------
  # Job 2: gate - the real pre-merge audit. python main.py --large audits the PR's diff;
  # on escalation it exits 1 (blocking the merge) unless a human has Approved the PR.
  #
  # TOGGLE (edit to enable): this job runs only when EITHER
  #   - the repo/Actions VARIABLE `RUN_AUDIT_GATE` == 'true'  (Settings > Variables), OR
  #   - you trigger it manually with the run_gate input checked.
  # Leave it off and only `tests` runs. Flip the variable (or set USE_LARGE below) to turn the
  # gate on without touching job logic.
  # ----------------------------------------------------------------------------
  gate:
    needs: tests
    # Run the gate when it's enabled (RUN_AUDIT_GATE) or dispatched manually - BUT on a review
    # event, only when the review is an approval, so a plain comment/request-changes review
    # doesn't burn an LLM run.
    if: >-
      (github.event_name != 'pull_request_review' || github.event.review.state == 'approved')
      && (vars.RUN_AUDIT_GATE == 'true' || (github.event_name == 'workflow_dispatch' && inputs.run_gate))
    runs-on: ubuntu-latest
    env:
      # CI-local DB. NOTE: this is the CI pgvector service's creds (postgres:postgres), NOT your
      # local .env's DATABASE_URL (audit:audit@localhost) - do not copy that one into a secret.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pr_audit
      # Real keys live in repo Secrets. GEMINI_API_KEY is REQUIRED; KEY2/3/4 are OPTIONAL - each one
      # that's set adds a billing project the retry layer rotates to (rotation in CI, as locally).
      # An unset optional secret resolves to "" and is dropped by the `if k` key-pool filter in
      # src/llm_retry.py, so a single-key setup works unchanged.
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}
      GEMINI_API_KEY3: ${{ secrets.GEMINI_API_KEY3 }}
      GEMINI_API_KEY4: ${{ secrets.GEMINI_API_KEY4 }}
      # Both tracers are opt-in and follow ONE convention: the API key is a repo Secret, the
      # non-sensitive config (project / endpoint / host) are repo Variables and only a hardcoded
      # on-switch stays a literal. So a fork configures tracing entirely from Settings > Secrets and
      # variables > Actions - never by editing this workflow. An unset key leaves the run untraced.
      #
      # LangSmith. Activates when LANGCHAIN_API_KEY is set.
      LANGCHAIN_TRACING_V2: "true"   # a flag, not config - stays a literal
      LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
      LANGCHAIN_PROJECT: ${{ vars.LANGCHAIN_PROJECT }}
      LANGCHAIN_ENDPOINT: ${{ vars.LANGCHAIN_ENDPOINT }}
      # Langfuse (v4 SDK, OTEL-based). Activates when LANGFUSE_PUBLIC_KEY is set (src/llm_client.py
      # gates on it), so an unset Variable leaves CI runs untraced - the no-op path.
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ vars.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_HOST: ${{ vars.LANGFUSE_HOST }}
      # EDIT HERE: "1" runs the gate with the --large flag (force compression); "0" runs a plain
      # audit (compression auto-fires only). Both audit the real PR diff and gate the build.
      USE_LARGE: "1"
    services:
      pgvector:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pr_audit
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before the job's steps run.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          # REQUIRED: full history so the gate can diff the PR against origin/<base>. A shallow
          # checkout (the default) would leave origin/<base> absent and the gate would silently
          # audit the demo fixture instead of the PR. Do not lower this.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialise pgvector schema
        run: python -m src.db.vectorstore
      - name: Seed baseline rules
        run: python -m scripts.seed_rules
      - name: Run audit gate
        # GITHUB_TOKEN is injected automatically and is what pr_is_human_approved uses via gh.
        # PR_NUMBER is passed explicitly because the CI checkout is a detached merge ref - `gh pr
        # view` can't infer the PR from the branch, so the approval lookup needs the number.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ "$USE_LARGE" = "1" ]; then
            python main.py --large
          else
            python main.py
          fi
